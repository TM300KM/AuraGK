<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AuraGK-Shop - Tu tienda virtual</title>

    <!-- Fuentes Google para estilo moderno -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Great+Vibes&display=swap"
      rel="stylesheet"
    />

    <!-- CSS Global -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <!-- Fondo animado -->
    <div class="animated-background" id="animated-bg">
      <div class="galaxy"></div>
      <div class="ufo" style="top: 50%; left: 0;"></div>
    </div>

    <!-- Header con logo y menú -->
    <header class="header container">
      <h1 class="logo">AuraGK-Shop</h1>

      <nav class="menu" id="menu">
        <a href="#shop">Tienda</a>
        <a href="#catalog">Catálogo</a>
        <a href="#contact">Contacto</a>
        <a href="#cart">Carrito (<span id="cart-count">0</span>)</a>
      </nav>
    </header>

    <!-- Sección principal de tienda -->
    <main class="container">
      <section id="shop" class="shop-section">
        <h2>Productos Destacados</h2>
        <div id="product-list" class="product-list"></div>
      </section>

      <section id="catalog" class="catalog-section">
        <h2>Catálogo Completo</h2>
        <div id="catalog-list" class="catalog-list"></div>
      </section>

      <section id="cart" class="cart-section">
        <h2>Carrito de Compras</h2>
        <div id="cart-items" class="cart-items"></div>
        <button id="checkout-btn">Finalizar Compra</button>
      </section>

      <section id="contact" class="contact-section">
        <h2>Contacto</h2>
        <form id="contact-form">
          <label for="name">Nombre:</label>
          <input type="text" id="name" name="name" required />

          <label for="email">Correo Electrónico:</label>
          <input type="email" id="email" name="email" required />

          <label for="message">Mensaje:</label>
          <textarea id="message" name="message" required></textarea>

          <button type="submit">Enviar</button>
        </form>
      </section>
    </main>

    <!-- Scripts -->
    <script src="js/script.js"></script>
  </body>
</html>
